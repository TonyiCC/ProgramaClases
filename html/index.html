<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espacios</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <h1>Espacios</h1>
        <p>Selecciona un espacio para abrir su calendario</p>
      </div>

      <div class="topbar-actions">
        <button id="usersBtn" class="users-btn hidden" type="button">USERS</button>
        <button id="editSpacesBtn" class="edit-spaces-btn hidden" type="button">
          Editar espacios
        </button>

        <div class="connect-wrapper">
          <button id="connectBtn" class="action-btn primary" type="button">Connect</button>

          <div id="connectDropdown" class="connect-dropdown">
            <div id="connectMenu">
              <button id="openLoginBtn" type="button" class="dropdown-item">Login</button>
              <button id="openRegisterBtn" type="button" class="dropdown-item">Sign Up</button>
              <button id="logoutBtn" type="button" class="dropdown-item hidden">Sign Out</button>
            </div>

            <form id="loginBox" class="auth-box hidden">
              <input id="loginIdentifier" type="text" placeholder="Usuario o email" autocomplete="username" required />
              <p id="loginIdentifierError" class="form-error hidden"></p>

              <input id="loginPassword" type="password" placeholder="Contraseña" autocomplete="current-password" required />
              <p id="loginPasswordError" class="form-error hidden"></p>

              <div class="auth-box-actions">
                <button type="submit" class="submit-btn">Login</button>
                <button id="loginRegisterLink" type="button" class="switch-link">Sign Up</button>
              </div>

              <p id="loginFormError" class="form-error hidden"></p>
            </form>

            <form id="registerBox" class="auth-box hidden">
              <input id="registerName" type="text" placeholder="Usuario" autocomplete="username" required />
              <p id="registerNameError" class="form-error hidden"></p>

              <input id="registerEmail" type="email" placeholder="Email" autocomplete="email" required />
              <p id="registerEmailError" class="form-error hidden"></p>

              <input id="registerPassword" type="password" placeholder="Contraseña" autocomplete="new-password" required />
              <p id="registerPasswordError" class="form-error hidden"></p>

              <div class="auth-box-actions">
                <button type="submit" class="submit-btn">Registrar</button>
                <button id="registerLoginLink" type="button" class="switch-link">Login</button>
              </div>

              <p id="registerFormError" class="form-error hidden"></p>
            </form>
          </div>
        </div>
      </div>
    </header>

    <main class="menu-panel">
      <div id="spacesGrid" class="spaces-grid"></div>
    </main>
  </div>

  <script src="/js/script.js"></script>
</body>
</html>
