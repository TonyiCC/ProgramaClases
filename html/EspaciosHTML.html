<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de espacios</title>
  <link rel="stylesheet" href="/css/Espacios_CSS.css" />
</head>
<body>
  <div class="spaces-page">
    <header class="spaces-header">
      <div>
        <h1>Gestión de espacios</h1>
        <p>Añade, elimina y asigna una imagen a cada espacio</p>
      </div>

      <a href="/" class="back-btn">Volver</a>
    </header>

    <main class="spaces-main">
      <section class="spaces-card">
        <div class="spaces-table-header">
          <button id="sortByNameBtn" type="button" class="header-btn">Nombre</button>
          <div class="header-btn no-click">Imagen</div>
          <div class="header-btn no-click">Acciones</div>
        </div>

        <div id="spacesList" class="spaces-list"></div>

        <button id="addSpaceBtn" type="button" class="add-space-btn">+</button>
      </section>
    </main>
  </div>

  <script src="/js/Espacios_Script.js"></script>
</body>
</html>
